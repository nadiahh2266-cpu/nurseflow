<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NurseFlow Pro — شبكة الجبيل الصحية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1a3a5c;--navy2:#15304d;--navy3:#0f2236;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-lt:#dbeafe;
  --teal:#0891b2;--teal-lt:#e0f2fe;
  --green:#059669;--green-lt:#d1fae5;
  --amber:#d97706;--amber-lt:#fef3c7;
  --red:#dc2626;--red-lt:#fee2e2;
  --purple:#7c3aed;--purple-lt:#ede9fe;
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f8fafc;--s3:#e2e8f0;
  --border:#cbd5e1;--border2:#e2e8f0;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--dim:#94a3b8;
  --morning:#d97706;--morning-bg:#fef3c7;
  --evening:#7c3aed;--evening-bg:#ede9fe;
  --night:#2563eb;--night-bg:#dbeafe;
  --off:#059669;--off-bg:#d1fae5;
  --official:#0891b2;--official-bg:#e0f2fe;
  --shift-h:36px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy3) 0%,var(--navy) 50%,var(--blue2) 100%)}
.lcard{background:white;border-radius:16px;padding:44px 36px;width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.25)}
.lbrand{text-align:center;margin-bottom:32px}
.llogo{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;
  box-shadow:0 8px 24px rgba(37,99,235,.35)}
.lname{font-size:22px;font-weight:800;color:var(--navy)}
.lsub{font-size:12px;color:var(--muted);margin-top:4px}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.fld input{width:100%;padding:12px 14px;background:#f8fafc;border:1.5px solid var(--border2);
  border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:.15s}
.fld input:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-login{width:100%;padding:14px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:white;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;
  transition:.15s;box-shadow:0 4px 15px rgba(37,99,235,.3)}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.forgot-btn{background:none;border:none;color:var(--muted);font-family:'Tajawal',sans-serif;
  font-size:12px;cursor:pointer;text-decoration:underline;margin-top:12px;display:block;width:100%;text-align:center}

/* ── APP ── */
#app{display:none;min-height:100vh;flex-direction:column}

/* ── TOP HEADER ── */
.topheader{background:var(--navy);color:white;padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
.th-brand{display:flex;align-items:center;gap:12px}
.th-logo{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.th-title{font-size:16px;font-weight:800;color:white}
.th-sub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.th-nav{display:flex;align-items:center;gap:2px}
.th-tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;
  color:rgba(255,255,255,.7);transition:.15s;display:flex;align-items:center;gap:6px;white-space:nowrap;
  border:none;background:none;font-family:'Tajawal',sans-serif}
.th-tab:hover{background:rgba(255,255,255,.1);color:white}
.th-tab.on{background:rgba(255,255,255,.18);color:white}
.th-tab .tbadge{background:var(--red);color:white;font-size:9px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.th-right{display:flex;align-items:center;gap:8px}
.th-user{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;
  background:rgba(255,255,255,.1);cursor:pointer}
.th-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white}
.th-uname{font-size:13px;font-weight:700;color:white}
.th-urole{font-size:10px;color:rgba(255,255,255,.6)}
.th-btn{padding:7px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.2);
  background:transparent;color:rgba(255,255,255,.8);font-family:'Tajawal',sans-serif;
  font-size:12px;cursor:pointer;transition:.15s}
.th-btn:hover{background:rgba(255,255,255,.15);color:white}

/* ── CONTENT ── */
.content{flex:1;padding:24px}
.pg{display:none}.pg.on{display:block}

/* ── PAGE HEADER ── */
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ptitle{font-size:18px;font-weight:800;color:var(--navy)}
.psub{font-size:12px;color:var(--muted);margin-top:2px}
.mctrl{display:flex;align-items:center;gap:6px}
.mctrl button{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;
  background:white;color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s}
.mctrl button:hover{border-color:var(--blue);color:var(--blue)}
.mlbl{font-size:14px;font-weight:700;min-width:120px;text-align:center;color:var(--navy)}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.scard{background:white;border:1px solid var(--border2);border-radius:12px;padding:18px;
  display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sc-label{font-size:11px;color:var(--muted);font-weight:600}
.sc-val{font-size:28px;font-weight:800;line-height:1;color:var(--navy)}
.sc-sub{font-size:11px;color:var(--dim)}
.sc-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.sc-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--teal))}

/* ── STATUS BAR ── */
.sbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;
  margin-bottom:18px;border:1.5px solid;font-size:13px;font-weight:700}
.sb-d{background:#f8fafc;border-color:var(--border);color:var(--muted)}
.sb-s{background:var(--amber-lt);border-color:#fcd34d;color:var(--amber)}
.sb-rv{background:var(--blue-lt);border-color:#93c5fd;color:var(--blue)}
.sb-a{background:var(--green-lt);border-color:#6ee7b7;color:var(--green)}
.sb-rj{background:var(--red-lt);border-color:#fca5a5;color:var(--red)}

/* ── CALENDAR ── */
.calwrap{background:white;border:1px solid var(--border2);border-radius:12px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05)}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy);border-bottom:1px solid rgba(255,255,255,.1)}
.calh{padding:11px 4px;text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.8)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.cday{min-height:80px;border-top:1px solid var(--border2);border-right:1px solid var(--border2);
  padding:8px;cursor:pointer;transition:background .1s;position:relative}
.cday:nth-child(7n){border-right:none}
.cday:hover:not(.cempty){background:#f0f9ff}.cempty{cursor:default}
.cday.today{background:#eff6ff}
.cday.today .dn{color:var(--blue);font-weight:900}
.cday.today::after{content:'';position:absolute;top:8px;right:8px;width:6px;height:6px;
  border-radius:50%;background:var(--blue)}
.dn{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.sp{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:2px}
.pm{background:var(--morning-bg);color:var(--morning)}
.pe{background:var(--evening-bg);color:var(--evening)}
.pn{background:var(--night-bg);color:var(--night)}
.po{background:var(--off-bg);color:var(--off)}
.pof{background:var(--official-bg);color:var(--official)}
.pl{background:#ffedd5;color:#c2410c}
.poc{background:var(--blue-lt);color:var(--blue)}
.pds{background:var(--red-lt);color:var(--red)}
.pav{background:var(--green-lt);color:var(--green)}

/* ── BUTTONS ── */
.btn-sub{padding:10px 20px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:white;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 3px 10px rgba(37,99,235,.25);transition:.15s}
.btn-sub:hover{transform:translateY(-1px)}
.btn-sub:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.btn-ok{flex:1;padding:9px;border:none;border-radius:8px;background:var(--green-lt);
  color:var(--green);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.btn-ok:hover{background:#a7f3d0}
.btn-no{flex:1;padding:9px;border:none;border-radius:8px;background:var(--red-lt);
  color:var(--red);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(15,34,54,.7);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:200}
.mbox{background:white;border-radius:16px;padding:28px;width:460px;max-height:90vh;
  overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.25);animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:4px}
.mdate{font-size:12px;color:var(--muted);margin-bottom:20px}
.sgm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.sopt{padding:13px 8px;border-radius:10px;border:1.5px solid var(--border2);background:#f8fafc;
  cursor:pointer;text-align:center;transition:.15s;position:relative}
.sopt:hover{transform:translateY(-2px);border-color:var(--border);background:white}
.sopt.picked{border-color:currentColor;background:white;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.sopt.dis{opacity:.3;cursor:not-allowed;pointer-events:none}
.sopt .ico{font-size:22px;margin-bottom:5px}
.sopt .lbl{font-size:11px;font-weight:700}
.sopt .tim{font-size:9px;color:var(--muted);margin-top:2px}
.cap-b{position:absolute;top:5px;left:5px;font-size:9px;font-weight:700;padding:2px 5px;border-radius:6px}
.cap-f{background:var(--red-lt);color:var(--red)}
.cap-o{background:var(--green-lt);color:var(--green)}
.mfoot{display:flex;gap:8px}
.btn-mc{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:9px;background:white;
  color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer}
.btn-ms{flex:2;padding:11px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:white;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ── NURSE CARDS ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.ncard{background:white;border:1px solid var(--border2);border-radius:12px;padding:18px;
  transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ncard:hover{border-color:var(--border);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.nctop{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.nav2{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0}
.nn{font-size:14px;font-weight:700;color:var(--navy)}.nd{font-size:11px;color:var(--muted)}
.nst{margin-right:auto}
.stpl{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.st-d{background:#f1f5f9;color:var(--muted)}
.st-s{background:var(--amber-lt);color:var(--amber)}
.st-rv{background:var(--blue-lt);color:var(--blue)}
.st-a{background:var(--green-lt);color:var(--green)}
.st-rj{background:var(--red-lt);color:var(--red)}
.nbal{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;
  background:#f8fafc;border-radius:10px;padding:10px;border:1px solid var(--border2)}
.nbi{font-size:11px}.nbl{color:var(--muted)}.nbv{font-weight:700;font-size:13px;color:var(--navy)}
.nacts{display:flex;gap:7px}

/* ── ALERTS ── */
.alerts{margin-bottom:20px}
.alert{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;
  border:1.5px solid;margin-bottom:8px;font-size:13px;font-weight:600}
.aw{background:var(--amber-lt);border-color:#fcd34d;color:var(--amber)}
.ae{background:var(--red-lt);border-color:#fca5a5;color:var(--red)}

/* ── TABLE ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--navy);padding:10px 6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.85);
  text-align:center;border-bottom:none;border-right:1px solid rgba(255,255,255,.1);
  white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:last-child{border-right:none}
thead th:first-child{text-align:right;padding-right:14px;min-width:150px}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s}
tbody tr:hover{background:#f0f9ff}
tbody td{padding:8px 6px;text-align:center;font-size:11px;border-right:1px solid var(--border2)}
tbody td:last-child{border-right:none}
tbody td:first-child{text-align:right;padding-right:14px}
.nrow{display:flex;align-items:center;gap:8px}
.mav{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;flex-shrink:0}

/* ── OVERVIEW ── */
.ovgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.ovday{background:white;border:1.5px solid var(--border2);border-radius:10px;padding:10px 8px;
  text-align:center;transition:.15s}
.ovday:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ovday.ald{border-color:#fca5a5;background:#fff5f5}
.ovdn{font-size:9px;color:var(--muted)}.ovnum{font-size:18px;font-weight:800;color:var(--navy);margin:2px 0 6px}
.ovrow{font-size:10px;font-weight:600;margin-bottom:2px}

/* ── BALCARD ── */
.balcard{background:white;border:1px solid var(--border2);border-radius:12px;padding:18px;
  margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.baltitle{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
.brow{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border2);font-size:12px}
.brow:last-child{border-bottom:none}
.bl{color:var(--muted)}.bv{font-weight:700;color:var(--navy)}
.bok{color:var(--green);font-weight:700}.bwarn{color:var(--amber);font-weight:700}.berr{color:var(--red);font-weight:700}

/* ── QUICK ACTIONS ── */
.qagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.qacard{background:white;border:1.5px solid var(--border2);border-radius:12px;padding:18px;
  cursor:pointer;transition:.15s;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.qacard:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 16px rgba(37,99,235,.12)}
.qa-ico{font-size:28px;margin-bottom:8px}
.qa-title{font-size:12px;font-weight:700;color:var(--navy)}

/* ── UPLOAD ── */
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:36px;text-align:center;
  cursor:pointer;transition:.2s;margin-bottom:16px}
.upload-area:hover{border-color:var(--blue);background:var(--blue-lt)}
.upload-area input{display:none}
.prog-wrap{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:3px;transition:width .3s}

/* ── PRINT ── */
.print-btn{padding:9px 16px;border:none;border-radius:9px;background:var(--green-lt);
  color:var(--green);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.edit-bal{margin-right:4px;padding:2px 7px;background:var(--blue-lt);border:none;border-radius:5px;
  color:var(--blue);cursor:pointer;font-size:10px}

/* ── DEADLINE BANNER ── */
.deadline-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;
  background:var(--amber-lt);border:1.5px solid #fcd34d;color:var(--amber);
  font-size:13px;font-weight:700;margin-bottom:18px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:12px 22px;border-radius:10px;font-size:13px;font-weight:700;
  background:var(--navy);color:white;box-shadow:0 10px 30px rgba(0,0,0,.2);
  z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.ts{background:var(--green)}
.ti{background:var(--blue)}
.td{background:var(--red)}
.tw{background:var(--amber)}
.loader{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:white;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE ── */
.mb-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:101;
  width:50px;height:50px;border-radius:50%;background:var(--navy);
  border:none;color:white;font-size:22px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.3);
  align-items:center;justify-content:center}
.mob-nav{display:none}

@media(max-width:768px){
  .th-nav{display:none}
  .mob-nav{display:block;background:var(--navy2);padding:8px}
  .mob-nav-inner{display:flex;flex-wrap:wrap;gap:4px}
  .th-tab-m{padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;
    color:rgba(255,255,255,.7);background:none;border:none;font-family:'Tajawal',sans-serif}
  .th-tab-m.on{background:rgba(255,255,255,.15);color:white}
  .content{padding:14px}
  .sgrid{grid-template-columns:1fr 1fr}
  .mbox{width:95vw;padding:20px 16px}
  .sgm{grid-template-columns:1fr 1fr}
  .mb-toggle{display:flex}
  .th-uname,.th-urole{display:none}
}

@media print{
  .topheader,.mob-nav,.btn-sub,.btn-ok,.btn-no,.th-btn,.edit-bal,.nacts,.phdr button,.mctrl button,.mb-toggle{display:none!important}
  .content{padding:0}
  .pg{display:block!important}
  .calwrap,.ncard,.balcard,.scard{border:1px solid #ccc!important;box-shadow:none!important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="lbrand">
      <div class="llogo">🏥</div>
      <div class="lname">NurseFlow Pro</div>

}

function getStats(uid,y,m){
  var data=ALL_S[uid]||{},counts={},work=0,rest=0,filled=0,floater=0,disaster=0;
  Object.keys(SCLS).forEach(function(k){counts[k]=0;});
  Object.keys(data).forEach(function(ds){
    var d=new Date(ds+'T00:00:00');
    if(d.getFullYear()!==y||d.getMonth()!==m)return;
    var e=data[ds];if(!e||!e.shift)return;
    counts[e.shift]=(counts[e.shift]||0)+1;filled++;
    if(SCAT[e.shift]==='work')work++;
    if(e.shift==='off')rest++;
    if(e.flag==='floater')floater++;
    if(e.flag==='disaster')disaster++;
  });
  return{counts:counts,work:work,rest:rest,filled:filled,days:new Date(y,m+1,0).getDate(),floater:floater,disaster:disaster};
}

function getReqRest(uid,y,m){
  var data=ALL_S[uid]||{},req=0;
  Object.keys(data).forEach(function(ds){
    var d=new Date(ds+'T00:00:00');
    if(d.getFullYear()!==y||d.getMonth()!==m)return;
    var sh=data[ds]&&data[ds].shift;
    if(sh&&REST[sh])req=Math.max(req,REST[sh]);
  });
  return req;
}

function shiftCount(dept,date,shift){
  return Object.values(ALL_P).filter(function(p){
    return p.role==='nurse'&&p.dept===dept&&(ALL_S[p.id]||{})[date]&&(ALL_S[p.id]||{})[date].shift===shift;
  }).length;
}

function shiftCap(dept,shift){
  var d=ALL_D[dept];if(!d)return 99;
  var m2={morning:'m',evening:'e',night:'n',long_day:'ld',long_night:'ld'};
  return d[m2[shift]]||99;
}

function getAlerts(dept,y,m){
  var days=new Date(y,m+1,0).getDate(),out=[];
  for(var d=1;d<=days&&out.length<8;d++){
    var ds=y+'-'+p2(m+1)+'-'+p2(d);
    ['morning','evening','night'].forEach(function(sh){
      var cap=shiftCap(dept,sh),cur=shiftCount(dept,ds,sh);
      if(cap<99&&cur<cap){
        var dt=new Date(ds+'T00:00:00');
        var dn=dt.toLocaleDateString('ar-SA',{month:'short',day:'numeric'});
        out.push({w:cur>0,msg:dn+' \u2014 '+SL(sh)+': '+cur+'/'+cap});
      }
    });
  }
  return out;
}

function checkDeadline(){
  if(!ME||ME.role!=='nurse')return;
  var st=(ALL_ST[ME.id]&&ALL_ST[ME.id].status)||'draft';
  if(st!=='draft'&&st!=='rejected')return;
  var now=new Date();
  var deadline=new Date(now.getFullYear(),now.getMonth(),20);
  var daysLeft=Math.ceil((deadline-now)/(1000*60*60*24));
  if(daysLeft<=0||daysLeft>10)return;
  if(document.getElementById('dl-banner'))return;
  var T=LANG==='ar';

function buildCal(gridId,uid,editable,y,m){
  var grid=document.getElementById(gridId);if(!grid)return;
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  var today=new Date(),data=ALL_S[uid]||{},h='';
  for(var i=0;i<first;i++)h+='<div class="cday cempty"></div>';
  for(var d=1;d<=days;d++){
    var ds=y+'-'+p2(m+1)+'-'+p2(d);
    var iT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var e=data[ds];
    var pill='';
    if(e){
      pill='<span class="sp '+(SCLS[e.shift]||'po')+'">'+SL(e.shift)+'</span>';
      if(e.flag==='floater')pill+='<span class="sp poc" style="font-size:8px">\uD83D\uDD35</span>';
      if(e.flag==='disaster')pill+='<span class="sp pds" style="font-size:8px">\uD83D\uDEA8</span>';
    }
    var cl=editable?'onclick="openModal(\''+ds+'\')"':'';
    h+='<div class="cday'+(iT?' today':'')+(editable?'':' cempty')+'" '+cl+'><div class="dn">'+d+'</div>'+pill+'</div>';
  }
  grid.innerHTML=h;
}

window.submitSched=async function(){
  await fsSet('schedule_status',ME.id,{nurse_id:ME.id,status:'submitted',submitted_at:new Date().toISOString(),reviewed_by:null,approved_by:null,notes:null});
  ALL_ST[ME.id]={nurse_id:ME.id,status:'submitted'};
  render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u0625\u0631\u0633\u0627\u0644 \u2713':'Submitted \u2713','ts');
};

window.openModal=function(ds){
  selDay=ds;selShift=null;selFlag=null;
  var e=(ALL_S[ME.id]||{})[ds];if(e){selShift=e.shift;selFlag=e.flag||null;}
  var dt=new Date(ds+'T00:00:00');
  document.getElementById('m-dt').textContent=dt.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  buildShiftOpts(ds);
  document.getElementById('smodal').style.display='flex';
};

function buildShiftOpts(ds){
  var dept=ME.dept||'';
  var myEntry=(ALL_S[ME.id]||{})[ds];
  var myShiftType=myEntry?myEntry.shift:null;
  var myFlag=myEntry?myEntry.flag:null;
  var order=['official','morning','evening','night','long_day','long_night','off','annual_leave','hajj','fitr','sick','exceptional','compensation'];
  var h='';
  if(myShiftType){
    var curLbl=SL(myShiftType)+(myFlag==='floater'?' \uD83D\uDD35':myFlag==='disaster'?' \uD83D\uDEA8':'');
    h+='<div style="grid-column:1/-1;padding:8px 12px;background:var(--s2);border-radius:8px;font-size:11px;color:var(--muted);margin-bottom:4px">'+(LANG==='ar'?'\u0627\u0644\u0634\u0641\u062a \u0627\u0644\u062d\u0627\u0644\u064a:':'Current:')+' <span style="color:var(--text);font-weight:700">'+curLbl+'</span></div>';
  }
  order.forEach(function(k){
    var cap=shiftCap(dept,k),cur=shiftCount(dept,ds,k);
    var myShift=myShiftType===k&&!selFlag;
    var isFull=SCAT[k]==='work'&&cap<99&&cur>=cap&&!myShift;
    var badge=SCAT[k]==='work'&&cap<99?'<span class="cap-b '+(isFull?'cap-f':'cap-o')+'">'+cur+'/'+cap+'</span>':'';
    var picked=(selShift===k&&!selFlag)?'picked':'';
    h+='<div class="sopt'+(isFull?' dis':'')+(picked?' '+picked:'')+'" style="color:'+SCOLOR[k]+'" onclick="pickShift(\''+k+'\',null)">';
    h+=badge+'<div class="ico">'+SICO[k]+'</div><div class="lbl">'+SL(k)+'</div><div class="tim">'+STIME[k]+'</div></div>';
  });
  h+='<div style="grid-column:1/-1;margin-top:8px;border-top:1px solid var(--b1);padding-top:10px;display:flex;gap:8px;flex-wrap:wrap">';
  var floaterPicked=(selShift==='off'&&selFlag==='floater');
  h+='<div class="sopt'+(floaterPicked?' picked':'')+' poc" style="color:var(--blue);flex:1;min-width:90px" onclick="pickShift(\'off\',\'floater\')">';
  h+='<div class="ico">\uD83D\uDD35</div><div class="lbl">'+SL('oncall')+'</div><div class="tim">Off \uD83D\uDD35</div></div>';
  var hasWork=myShiftType&&SCAT[myShiftType]==='work';
  var disasterPicked=(selFlag==='disaster');
  h+='<div class="sopt'+(disasterPicked?' picked':'')+(hasWork?'':' dis')+'" style="color:var(--red);flex:1;min-width:90px"'+(hasWork?' onclick="pickShift(\''+myShiftType+'\',\'disaster\')"':'')+' title="'+(hasWork?'':LANG==='ar'?'\u064a\u062c\u0628 \u0623\u0646 \u064a\u0643\u0648\u0646 \u0644\u062f\u064a\u0647\u0627 \u0634\u0641\u062a \u0639\u0645\u0644':'Requires work shift')+'">';
  h+='<div class="ico">\uD83D\uDEA8</div><div class="lbl">'+SL('disaster')+'</div><div class="tim">'+(hasWork?'\uD83D\uDEA8+'+SL(myShiftType):LANG==='ar'?'\u064a\u062a\u0637\u0644\u0628 \u0634\u0641\u062a':'needs shift')+'</div></div>';
  h+='</div>';
  document.getElementById('shift-opts').innerHTML=h;
}

window.closeModal=function(){document.getElementById('smodal').style.display='none';};

window.pickShift=function(k,flag){
  selShift=k;selFlag=flag!==undefined?flag:null;
  buildShiftOpts(selDay);
};

window.saveShift=async function(){
  if(!selShift){toast(LANG==='ar'?'\u0627\u062e\u062a\u0631 \u0627\u0644\u0634\u0641\u062a':'Select shift','tw');return;}
  var dept=ME.dept||'',cap=shiftCap(dept,selShift),cur=shiftCount(dept,selDay,selShift);
  var myEntry=(ALL_S[ME.id]||{})[selDay];
  var isMine=myEntry&&myEntry.shift===selShift;
  if(SCAT[selShift]==='work'&&cap<99&&cur>=cap&&!isMine&&!selFlag){toast((LANG==='ar'?'\u0627\u0644\u0634\u0641\u062a \u0645\u0643\u062a\u0645\u0644 ':'Shift full ')+cur+'/'+cap,'td');return;}
  var docId=myEntry&&myEntry.docId;
  var flag=selFlag||null;
  var schedData={nurse_id:ME.id,date:selDay,shift:selShift,flag:flag};
  if(docId){
    await fsSet('schedules',docId,schedData);
  }else{
    var ref=await fsAdd('schedules',schedData);
    docId=ref.id;
  }
  if(!ALL_S[ME.id])ALL_S[ME.id]={};
  ALL_S[ME.id][selDay]={shift:selShift,flag:flag,docId:docId};
  var curSt=ALL_ST[ME.id]&&ALL_ST[ME.id].status;
  if(curSt&&curSt!=='draft'){
    await fsSet('schedule_status',ME.id,{status:'draft'});
    ALL_ST[ME.id]={...ALL_ST[ME.id],status:'draft'};
  }
  closeModal();render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062d\u0641\u0638 \u2713':'Saved \u2713','ts');
};

function nurseCard(p,role,y,m){
  var uid=p.id,st=(ALL_ST[uid]&&ALL_ST[uid].status)||'draft';
  var stats=getStats(uid,y,m),req=getReqRest(uid,y,m),T=LANG==='ar';
  var stMap={draft:{cls:'st-d',lbl:T?'\u0645\u0633\u0648\u062f\u0629':'Draft'},submitted:{cls:'st-s',lbl:'\u23F3 '+(T?'\u0645\u0631\u0627\u062c\u0639\u0629':'Review')},reviewed:{cls:'st-rv',lbl:'\uD83D\uDD0D '+(T?'\u0631\u0627\u062c\u0639\u062a':'Reviewed')},approved:{cls:'st-a',lbl:'\u2705 '+(T?'\u0645\u0648\u0627\u0641\u0642':'Approved')},rejected:{cls:'st-rj',lbl:'\u2716 '+(T?'\u0645\u0631\u0641\u0648\u0636':'Rejected')}};
  var s=stMap[st]||stMap.draft;
  var actions='';

    actions='<button class="btn-ok" onclick="hnOk(\''+uid+'\')">'+(T?'\u2705 \u0645\u0648\u0627\u0641\u0642\u0629 \u0648\u0625\u0631\u0633\u0627\u0644':'\u2705 Approve & Send')+'</button><button class="btn-no" onclick="hnNo(\''+uid+'\')">'+(T?'\u21A9 \u0625\u0631\u062c\u0627\u0639':'\u21A9 Return')+'</button>';
  }else if((role==='manager'||role==='admin')&&st==='reviewed'){
    actions='<button class="btn-ok" onclick="mgOk(\''+uid+'\')">'+(T?'\u2705 \u0645\u0648\u0627\u0641\u0642\u0629 \u0646\u0647\u0627\u0626\u064a\u0629':'\u2705 Final Approval')+'</button><button class="btn-no" onclick="mgNo(\''+uid+'\')">'+(T?'\u2716 \u0631\u0641\u0636':'\u2716 Reject')+'</button>';
  }else{actions='<span style="color:var(--muted);font-size:11px">'+s.lbl+'</span>';}
  return '<div class="ncard"><div class="nctop"><div class="nav2">'+p.name.slice(0,2)+'</div><div><div class="nn">'+p.name+'</div><div class="nd">'+(p.dept||'')+'</div></div><div class="nst"><span class="stpl '+s.cls+'">'+s.lbl+'</span></div></div>'
    +'<div class="nbal"><div class="nbi"><div class="nbl">'+(T?'\u0623\u064a\u0627\u0645 \u0645\u062d\u062f\u062f\u0629':'Days set')+'</div><div class="nbv">'+stats.filled+'/'+stats.days+'</div></div>'
    +'<div class="nbi"><div class="nbl">'+(T?'\u0627\u0644\u0631\u0627\u062d\u0629':'Rest')+'</div><div class="nbv '+(stats.rest>=req&&req>0?'bok':'berr')+'">'+stats.rest+'/'+(req||'?')+'</div></div></div>'
    +'<div class="nacts">'+actions+'</div></div>';
}

function getNursesByRole(){
  var myDepts=ME.role==='manager'?(ALL_MD[ME.id]||[]):null;
  return Object.values(ALL_P).filter(function(p){
    if(p.role!=='nurse')return false;
    if(ME.role==='head_nurse')return p.dept===ME.dept;
    if(myDepts)return myDepts.indexOf(p.dept)>=0;
    return true;
  });
}

window.respondSwap=async function(id,status){
  var T=LANG==='ar';
  var swap=ALL_SW.find(function(s){return String(s.id)===String(id);});
  await fsSet('swap_requests',id,{status:status});
  var idx=ALL_SW.findIndex(function(s){return s.id===id;});
  if(idx>=0)ALL_SW[idx].status=status;
  if(status==='approved'&&swap){
    var myShift=(ALL_S[ME.id]||{})[swap.swap_date];
    var theirShift=(ALL_S[swap.requester_id]||{})[swap.swap_date];
    if(myShift){
      var ref1=await fsAdd('schedules',{nurse_id:swap.requester_id,date:swap.swap_date,shift:myShift.shift,flag:myShift.flag||null});
      if(!ALL_S[swap.requester_id])ALL_S[swap.requester_id]={};
      ALL_S[swap.requester_id][swap.swap_date]={shift:myShift.shift,flag:myShift.flag||null,docId:ref1.id};
    }
    if(theirShift){
      var ref2=await fsAdd('schedules',{nurse_id:ME.id,date:swap.swap_date,shift:theirShift.shift,flag:theirShift.flag||null});
      if(!ALL_S[ME.id])ALL_S[ME.id]={};
      ALL_S[ME.id][swap.swap_date]={shift:theirShift.shift,flag:theirShift.flag||null,docId:ref2.id};
    }
  }
  toast(status==='approved'?(T?'\u062a\u0645 \u0627\u0644\u062a\u0628\u062f\u064a\u0644 \u2713':'Swapped \u2713'):(T?'\u062a\u0645 \u0627\u0644\u0631\u0641\u0636':'Rejected'),'ts');
  render();
};

window.exportToCalendar=function(){

  Object.keys(data).forEach(function(ds){
    var e=data[ds];if(!e||!e.shift||e.shift==='off')return;
    var times={official:'073000',morning:'070000',evening:'150000',night:'230000',long_day:'070000',long_night:'190000'};
    var endTimes={official:'163000',morning:'163000',evening:'003000',night:'073000',long_day:'190000',long_night:'070000'};
    var st2=times[e.shift]||'070000',et=endTimes[e.shift]||'150000';
    var dateStr=ds.replace(/-/g,'');
    var endDate=(e.shift==='night'||e.shift==='long_night')?new Date(new Date(ds+'T00:00:00').getTime()+86400000).toISOString().slice(0,10).replace(/-/g,''):dateStr;

};

window.handleUpload=function(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var data=new Uint8Array(e.target.result);
    var wb=XLSX.read(data,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rows.length<2){toast(LANG==='ar'?'\u0627\u0644\u0645\u0644\u0641 \u0641\u0627\u0631\u063a':'Empty file','tw');return;}
    processRows(rows.slice(1));
  };
  reader.readAsArrayBuffer(file);
};

async function processRows(rows){
  var T=LANG==='ar';
  var valid=rows.filter(function(r){return r[0]&&r[1]&&r[2];});
  if(!valid.length){toast(T?'\u0644\u0627 \u062a\u0648\u062c\u062f \u0628\u064a\u0627\u0646\u0627\u062a':'No valid data','tw');return;}
  document.getElementById('upload-progress').style.display='block';
  var results=[],done=0;
  for(var i=0;i<valid.length;i++){
    var row=valid[i];
    var name=String(row[0]||'').trim(),email=String(row[1]||'').trim().toLowerCase(),pass=String(row[2]||'1234').trim(),role=String(row[3]||'nurse').trim(),dept=String(row[4]||'').trim();
    if(!['nurse','head_nurse','manager','admin'].includes(role))role='nurse';
    try{
      // Note: Creating users via client SDK requires admin SDK. Show instructions instead.
      results.push({name:name,email:email,ok:false,msg:'يجب إنشاء المستخدم يدوياً في Firebase Console'});
    }catch(e){results.push({name:name,email:email,ok:false,msg:e.message});}
    done++;
    var pct=Math.round(done/valid.length*100);
    document.getElementById('prog-bar').style.width=pct+'%';
    document.getElementById('prog-text').textContent=(T?'\u062c\u0627\u0631\u064d \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629: ':'Processing: ')+done+'/'+valid.length;
  }
  showUploadResults(results);
}

function showUploadResults(results){
  var T=LANG==='ar';
  var ok=results.filter(function(r){return r.ok;}).length;
  var fail=results.filter(function(r){return !r.ok;});
  var h='<div class="balcard" style="margin-top:16px"><div class="baltitle">\u2139\uFE0F '+(T?'\u0645\u0644\u0627\u062d\u0638\u0629':'Note')+'</div>';

  h+='</div>';
  document.getElementById('upload-results').innerHTML=h;
  document.getElementById('upload-progress').style.display='none';
}

window.toggleMgrDept=async function(mgrId,dept){
  var myDepts=ALL_MD[mgrId]||[];
  var has=myDepts.indexOf(dept)>=0;
  if(has){
    var snap=await getDocs(query(collection(db,'manager_departments'),where('manager_id','==',mgrId),where('dept_name','==',dept)));
    for(var d of snap.docs)await fsDel('manager_departments',d.id);
    ALL_MD[mgrId]=myDepts.filter(function(d){return d!==dept;});
    toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062d\u0630\u0641':'Removed','ti');

    await fsAdd('manager_departments',{manager_id:mgrId,dept_name:dept});
    if(!ALL_MD[mgrId])ALL_MD[mgrId]=[];ALL_MD[mgrId].push(dept);

  if(!date){toast(T?'\u0627\u062e\u062a\u0631 \u062a\u0627\u0631\u064a\u062e\u0627\u064b':'Select date','tw');return;}
  var isBooked=Object.keys(ALL_LP).some(function(uid){if(uid===ME.id)return false;var n=ALL_P[uid];if(!n||n.dept!==ME.dept)return false;return(ALL_LP[uid]||[]).some(function(p){return p.date===date;});});
  if(isBooked){toast(T?'\u0627\u0644\u062a\u0627\u0631\u064a\u062e \u0645\u062d\u062c\u0648\u0632':' Date taken','tw');return;}
  var ref=await fsAdd('leave_plan',{nurse_id:ME.id,date:date,type:type});
  if(!ALL_LP[ME.id])ALL_LP[ME.id]=[];
  ALL_LP[ME.id].push({id:ref.id,nurse_id:ME.id,date:date,type:type});
  renderLeave();toast(T?'\u062a\u0645 \u0627\u0644\u0625\u0636\u0627\u0641\u0629 \u2713':'Added','ts');
};

window.toggleLeavePlan=async function(ds){
  var myPlans=ALL_LP[ME.id]||[];
  var existing=myPlans.find(function(p){return p.date===ds;});
  if(existing){window.deleteLeavePlan(existing.id);return;}
  var isBooked=Object.keys(ALL_LP).some(function(uid){if(uid===ME.id)return false;var n=ALL_P[uid];if(!n||n.dept!==ME.dept)return false;return(ALL_LP[uid]||[]).some(function(p){return p.date===ds;});});
  if(isBooked){toast(LANG==='ar'?'\u0645\u062d\u062c\u0648\u0632':'Taken','tw');return;}
  var ref=await fsAdd('leave_plan',{nurse_id:ME.id,date:ds,type:'annual_leave'});
  if(!ALL_LP[ME.id])ALL_LP[ME.id]=[];
  ALL_LP[ME.id].push({id:ref.id,nurse_id:ME.id,date:ds,type:'annual_leave'});
  renderLeave();
};

window.deleteLeavePlan=async function(id){
  await fsDel('leave_plan',id);
  if(ALL_LP[ME.id])ALL_LP[ME.id]=ALL_LP[ME.id].filter(function(p){return p.id!==id;});
  renderLeave();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062d\u0630\u0641':'Removed','ti');
};

function renderAI(){
  var pg=document.getElementById('pg-ai'),T=LANG==='ar';if(!pg)return;
  var nurses=Object.values(ALL_P).filter(function(p){return p.role==='nurse'&&p.dept===ME.dept;});
  var dept=ALL_D[ME.dept]||{m:3,e:3,n:3};
  var h='<div class="phdr"><div><div class="ptitle">\uD83E\uDD16 '+(T?'\u062c\u062f\u0648\u0644 \u0630\u0643\u064a':'AI Schedule')+'</div></div>';
  h+='<div class="mctrl"><button onclick="chMonth(-1)">\u203A</button><div class="mlbl">'+mN(MONTH)+'</div><button onclick="chMonth(1)">\u2039</button></div></div>';
  h+='<div class="balcard"><div style="font-size:12px;color:var(--muted);margin-bottom:12px">\u2600\uFE0F '+dept.m+'&nbsp; \uD83C\uDF06 '+dept.e+'&nbsp; \uD83C\uDF19 '+dept.n+'&nbsp; \uD83D\uDC69\u200D\u2695\uFE0F '+nurses.length+'</div>';
  h+='<label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px">'+(T?'\u0637\u0644\u0628 \u062e\u0627\u0635 (\u0627\u062e\u062a\u064a\u0627\u0631\u064a)':'Special request (optional)')+'</label>';
  h+='<textarea id="ai-req" rows="3" style="width:100%;padding:10px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--text);font-family:Tajawal,sans-serif;font-size:13px;outline:none;resize:vertical"></textarea>';
  h+='<button class="btn-sub" onclick="generateAISchedule()" id="ai-btn" style="width:100%;margin-top:12px">\uD83E\uDD16 '+(T?'\u062a\u0648\u0644\u064a\u062f \u0627\u0644\u062c\u062f\u0648\u0644':'Generate Schedule')+'</button></div>';
  h+='<div id="ai-result"></div>';
  pg.innerHTML=h;
}

window.generateAISchedule=async function(){
  var T=LANG==='ar';
  var btn=document.getElementById('ai-btn');if(!btn)return;
  var reqEl=document.getElementById('ai-req');var req=reqEl?reqEl.value:'';
  var nurses=Object.values(ALL_P).filter(function(p){return p.role==='nurse'&&p.dept===ME.dept;});
  var y=MONTH.getFullYear(),m=MONTH.getMonth();
  var daysInMonth=new Date(y,m+1,0).getDate();
  var dept=ALL_D[ME.dept]||{m:3,e:3,n:3};
  btn.disabled=true;btn.innerHTML='<span class="loader"></span> '+(T?'\u062c\u0627\u0631\u064d...':'Generating...');
  var leaveInfo=nurses.map(function(n){var plans=(ALL_LP[n.id]||[]).filter(function(p){var dt=new Date(p.date+'T00:00:00');return dt.getFullYear()===y&&dt.getMonth()===m;}).map(function(p){return p.date.slice(8);});return n.name+(plans.length?' (off:'+plans.join(',')+')':'');}).join('; ');
  var prompt='Create a '+daysInMonth+'-day nurse schedule for '+mN(MONTH)+'.\nNurses: '+nurses.map(function(n){return n.name;}).join(', ')+'\nDaily needs: morning='+dept.m+', evening='+dept.e+', night='+dept.n+'\nLeave info: '+leaveInfo+(req?'\nSpecial: '+req:'')+'\nRules: min 6 rest days, fair distribution, max 3 consecutive same shifts, respect leaves.\nReturn ONLY JSON: {"schedule":{"NurseName":{"1":"morning","2":"off",...all '+daysInMonth+' days}},"summary":"Arabic summary"}';
  try{
    var response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
    var data=await response.json();
    btn.disabled=false;btn.textContent='\uD83E\uDD16 '+(T?'\u062a\u0648\u0644\u064a\u062f \u062c\u062f\u064a\u062f':'Regenerate');
    var text=data.content&&data.content[0]&&data.content[0].text||'';
    var jm=text.match(/\{[\s\S]*\}/);if(!jm)throw new Error('no json');
    var result=JSON.parse(jm[0]);
    window._aiSchedule={schedule:result.schedule,nurses:nurses,y:y,m:m,days:daysInMonth};
    showAIResult(result.schedule,result.summary||'',daysInMonth);
  }catch(e){
    btn.disabled=false;btn.textContent='\uD83E\uDD16';
    var el=document.getElementById('ai-result');
    if(el)el.innerHTML='<div class="alert ae">\u26A0\uFE0F '+e.message+'</div>';
  }
};

function showAIResult(schedule,summary,daysInMonth){
  var T=LANG==='ar',el=document.getElementById('ai-result');if(!el)return;
  var h='<div class="balcard"><div class="baltitle">\u2705 '+(T?'\u0627\u0644\u062c\u062f\u0648\u0644 \u0627\u0644\u0645\u0642\u062a\u0631\u062d':'Proposed Schedule')+'</div>';
  if(summary)h+='<div style="padding:10px;background:var(--blue-bg);border-radius:8px;font-size:12px;color:var(--blue);margin-bottom:12px">'+summary+'</div>';
  h+='<div class="twrap"><table><thead><tr><th>'+(T?'\u0627\u0644\u0645\u0645\u0631\u0636\u0629':'Nurse')+'</th>';
  for(var d=1;d<=daysInMonth;d++)h+='<th>'+d+'</th>';
  h+='</tr></thead><tbody>';
  Object.keys(schedule).forEach(function(nm){var sh=schedule[nm];h+='<tr><td style="white-space:nowrap;font-weight:700">'+nm+'</td>';for(var d=1;d<=daysInMonth;d++){var sv=sh[String(d)]||sh[d]||'off';h+='<td><span class="sp '+(SCLS[sv]||'po')+'">'+(SICO[sv]||sv.slice(0,1))+'</span></td>';}h+='</tr>';});
  h+='</tbody></table></div>';
  h+='<div style="display:flex;gap:10px;margin-top:16px"><button class="btn-sub" onclick="applyAISchedule()">\u2705 '+(T?'\u062a\u0637\u0628\u064a\u0642':'Apply')+'</button><button class="btn-no" style="padding:10px 16px;border-radius:9px" onclick="renderAI()">\uD83D\uDD04 '+(T?'\u0625\u0639\u0627\u062f\u0629':'Retry')+'</button></div></div>';
  el.innerHTML=h;
}

window.applyAISchedule=async function(){
  var T=LANG==='ar';
  if(!window._aiSchedule){toast(T?'\u0644\u0627 \u064a\u0648\u062c\u062f \u062c\u062f\u0648\u0644':'No schedule','tw');return;}
  var ref=window._aiSchedule;
  if(!confirm(T?'\u062a\u0637\u0628\u064a\u0642 \u0627\u0644\u062c\u062f\u0648\u0644 \u0639\u0644\u0649 \u062c\u0645\u064a\u0639 \u0627\u0644\u0645\u0645\u0631\u0636\u0627\u062a\u061f':'Apply to all nurses?'))return;
  var count=0;
  for(var i=0;i<ref.nurses.length;i++){
    var nurse=ref.nurses[i];
    var sh=ref.schedule[nurse.name];if(!sh)continue;
    var days=Object.keys(sh);
    for(var j=0;j<days.length;j++){
      var day=days[j];var shift=sh[day];if(!shift||shift==='off')continue;
      var ds=ref.y+'-'+String(ref.m+1).padStart(2,'0')+'-'+String(parseInt(day)).padStart(2,'0');
      var docRef=await fsAdd('schedules',{nurse_id:nurse.id,date:ds,shift:shift,flag:null});
      if(!ALL_S[nurse.id])ALL_S[nurse.id]={};
      ALL_S[nurse.id][ds]={shift:shift,flag:null,docId:docRef.id};
      count++;
    }
  }
  toast((T?'\u062a\u0645 \u062a\u0637\u0628\u064a\u0642 ':'Applied ')+count+(T?' \u064a\u0648\u0645 \u2713':' days'),'ts');
  switchPg('pg-team');
};

// ── INIT ──
onAuthStateChanged(auth,async function(user){
  if(user){await loadMe(user.uid);}
});

</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NurseFlow Pro — شبكة الجبيل الصحية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── THEME ── */
:root{
  --bg:#070b14;--s1:#0d1117;--s2:#161b22;--s3:#1e2530;
  --b1:#2a3140;--b2:#3d4a5c;--text:#e8eef5;--muted:#6b7a8d;--dim:#2a3140;
  --blue:#3b82f6;--blue-d:#2563eb;--blue-bg:rgba(59,130,246,.1);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,.1);
  --morning:#f59e0b;--morning-bg:rgba(245,158,11,.1);
  --evening:#a855f7;--evening-bg:rgba(168,85,247,.1);
  --night:#3b82f6;--night-bg:rgba(59,130,246,.1);
  --off:#10b981;--off-bg:rgba(16,185,129,.1);
  --red:#ef4444;--green:#10b981;--orange:#f97316;
  --official:#06b6d4;--official-bg:rgba(6,182,212,.1);
  --sidebar:220px;
}
[data-theme=light]{
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f8fafc;--s3:#eef2f7;
  --b1:#dde3ec;--b2:#b0bac8;--text:#111827;--muted:#6b7280;--dim:#e2e8f0;
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.08);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.08);
  --morning:#d97706;--morning-bg:rgba(217,119,6,.08);
  --evening:#7c3aed;--evening-bg:rgba(124,58,237,.08);
  --night:#2563eb;--night-bg:rgba(37,99,235,.08);
  --off:#059669;--off-bg:rgba(5,150,105,.08);
  --red:#dc2626;--green:#059669;--orange:#ea580c;
  --official:#0891b2;--official-bg:rgba(8,145,178,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(59,130,246,.12),transparent)}
.lcard{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:40px 32px;width:380px;
  box-shadow:0 25px 50px rgba(0,0,0,.4)}
.lbrand{text-align:center;margin-bottom:28px}
.llogo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;
  box-shadow:0 8px 24px rgba(59,130,246,.35)}
.lname{font-size:20px;font-weight:800;color:var(--text)}
.lsub{font-size:11px;color:var(--muted);margin-top:3px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.fld input{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);
  border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:all .15s}
.fld input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn-login{width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
  margin-top:6px;transition:all .15s;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.4)}
.forgot-btn{background:none;border:none;color:var(--muted);font-family:'Tajawal',sans-serif;
  font-size:12px;cursor:pointer;text-decoration:underline;margin-top:10px;display:block;width:100%;text-align:center}

/* ── APP LAYOUT ── */
#app{display:none;min-height:100vh}
.app-layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--s1);border-left:1px solid var(--b1);
  display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100;
  transition:transform .25s}
.sb-brand{padding:18px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px}
.sb-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-title{font-size:14px;font-weight:800;color:var(--text)}
.sb-sub{font-size:10px;color:var(--muted)}

.sb-user{padding:14px 16px;border-bottom:1px solid var(--b1)}
.sb-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:700}
.sb-urole{font-size:10px;color:var(--muted)}

.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all .15s;margin-bottom:3px;font-size:13px;color:var(--muted);font-weight:500}
.sb-item:hover{background:var(--s2);color:var(--text)}
.sb-item.on{background:var(--blue-bg);color:var(--blue);font-weight:700}
.sb-item .ico{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.sb-badge{background:var(--red);color:white;font-size:9px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
  padding:0 4px;margin-right:auto}
.sb-bottom{padding:12px 8px;border-top:1px solid var(--b1);display:flex;gap:6px}
.sb-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--b1);background:transparent;
  color:var(--muted);font-family:'Tajawal',sans-serif;font-size:11px;cursor:pointer;
  transition:all .15s;text-align:center}
.sb-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── MAIN ── */
.main{margin-right:var(--sidebar);flex:1;min-height:100vh}
.topbar{height:52px;background:rgba(13,17,23,.95);border-bottom:1px solid var(--b1);
  backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:50}
[data-theme=light] .topbar{background:rgba(255,255,255,.95)}
.tb-title{font-size:15px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{padding:6px 12px;background:transparent;border:1px solid var(--b1);border-radius:8px;
  color:var(--muted);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--blue);color:var(--blue)}

.wrap{padding:22px 24px}
.pg{display:none}.pg.on{display:block}

/* ── ALERT BANNER ── */
.deadline-banner{display:flex;align-items:center;gap:10px;padding:11px 16px;
  border-radius:10px;background:var(--morning-bg);border:1px solid rgba(245,158,11,.3);
  color:var(--morning);font-size:13px;font-weight:600;margin-bottom:18px}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.scard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;
  display:flex;flex-direction:column;gap:6px;transition:all .15s}
.scard:hover{border-color:var(--b2)}
.sc-label{font-size:11px;color:var(--muted);font-weight:500}
.sc-val{font-size:26px;font-weight:800;line-height:1}
.sc-sub{font-size:11px;color:var(--muted)}
.sc-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.sc-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--purple))}

/* ── PAGE HEADER ── */
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ptitle{font-size:17px;font-weight:800}
.psub{font-size:12px;color:var(--muted);margin-top:2px}
.mctrl{display:flex;align-items:center;gap:6px}
.mctrl button{width:30px;height:30px;border:1px solid var(--b1);border-radius:8px;
  background:var(--s2);color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.mctrl button:hover{border-color:var(--blue);color:var(--blue)}
.mlbl{font-size:13px;font-weight:700;min-width:115px;text-align:center}

/* ── STATUS BAR ── */
.sbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;
  margin-bottom:18px;border:1px solid;font-size:13px;font-weight:600}
.sb-d{background:rgba(107,122,141,.06);border-color:var(--b1);color:var(--muted)}
.sb-s{background:var(--morning-bg);border-color:rgba(245,158,11,.3);color:var(--morning)}
.sb-rv{background:var(--blue-bg);border-color:rgba(59,130,246,.3);color:var(--blue)}
.sb-a{background:var(--off-bg);border-color:rgba(16,185,129,.3);color:var(--green)}
.sb-rj{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--red)}

/* ── CALENDAR ── */
.calwrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s2);border-bottom:1px solid var(--b1)}
.calh{padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--muted)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.cday{min-height:76px;border-top:1px solid var(--b1);border-right:1px solid var(--b1);
  padding:7px;cursor:pointer;transition:background .1s;position:relative}
.cday:nth-child(7n){border-right:none}
.cday:hover:not(.cempty){background:var(--s2)}.cempty{cursor:default}
.cday.today .dn{color:var(--blue);font-weight:900}
.cday.today::after{content:'';position:absolute;top:7px;right:7px;width:5px;height:5px;
  border-radius:50%;background:var(--blue)}
.dn{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.sp{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:2px}
.pm{background:var(--morning-bg);color:var(--morning)}
.pe{background:var(--evening-bg);color:var(--evening)}
.pn{background:var(--night-bg);color:var(--night)}
.po{background:var(--off-bg);color:var(--off)}
.pof{background:var(--official-bg);color:var(--official)}
.pl{background:rgba(249,115,22,.1);color:var(--orange)}
.poc{background:rgba(59,130,246,.1);color:var(--blue)}
.pds{background:rgba(239,68,68,.1);color:var(--red)}
.pav{background:var(--off-bg);color:var(--green)}

/* ── SUBMIT ── */
.btn-sub{padding:10px 18px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 12px rgba(59,130,246,.3);transition:all .15s}
.btn-sub:hover{transform:translateY(-1px)}
.btn-sub:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:200}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:28px;
  width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:800;margin-bottom:4px}
.mdate{font-size:12px;color:var(--muted);margin-bottom:20px}
.sgm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.sopt{padding:13px 8px;border-radius:11px;border:1.5px solid var(--b1);background:var(--s2);
  cursor:pointer;text-align:center;transition:all .15s;position:relative}
.sopt:hover{transform:translateY(-2px);border-color:var(--b2)}
.sopt.picked{border-color:currentColor;background:var(--s3)}
.sopt.dis{opacity:.3;cursor:not-allowed;pointer-events:none}
.sopt .ico{font-size:22px;margin-bottom:5px}
.sopt .lbl{font-size:11px;font-weight:700}
.sopt .tim{font-size:9px;color:var(--muted);margin-top:2px}
.cap-b{position:absolute;top:5px;left:5px;font-size:9px;font-weight:700;
  padding:2px 5px;border-radius:8px}
.cap-f{background:rgba(239,68,68,.15);color:var(--red)}
.cap-o{background:rgba(16,185,129,.15);color:var(--green)}
.mfoot{display:flex;gap:8px}
.btn-mc{flex:1;padding:11px;border:1px solid var(--b1);border-radius:9px;background:transparent;
  color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer}
.btn-ms{flex:2;padding:11px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ── NURSE CARDS ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ncard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;transition:all .15s}
.ncard:hover{border-color:var(--b2)}
.nctop{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.nav2{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0}
.nn{font-size:14px;font-weight:700}.nd{font-size:11px;color:var(--muted)}
.nst{margin-right:auto}
.stpl{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.st-d{background:rgba(107,122,141,.1);color:var(--muted)}
.st-s{background:var(--morning-bg);color:var(--morning)}
.st-rv{background:var(--blue-bg);color:var(--blue)}
.st-a{background:var(--off-bg);color:var(--green)}
.st-rj{background:rgba(239,68,68,.1);color:var(--red)}
.nbal{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;
  background:var(--s2);border-radius:10px;padding:10px}
.nbi{font-size:11px}.nbl{color:var(--muted)}.nbv{font-weight:700;font-size:13px}
.nacts{display:flex;gap:7px}
.btn-ok{flex:1;padding:9px;border:none;border-radius:9px;background:rgba(16,185,129,.12);
  color:var(--green);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.btn-ok:hover{background:rgba(16,185,129,.22)}
.btn-no{flex:1;padding:9px;border:none;border-radius:9px;background:rgba(239,68,68,.08);
  color:var(--red);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer}

/* ── ALERTS ── */
.alerts{margin-bottom:20px}
.alert{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;
  border:1px solid;margin-bottom:8px;font-size:13px;font-weight:600}
.aw{background:var(--morning-bg);border-color:rgba(245,158,11,.3);color:var(--morning)}
.ae{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--red)}

/* ── TABLE ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--s2);padding:10px 6px;font-size:10px;font-weight:700;color:var(--muted);
  text-align:center;border-bottom:1px solid var(--b1);border-right:1px solid var(--b1);
  white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:last-child{border-right:none}
thead th:first-child{text-align:right;padding-right:14px;min-width:150px}
tbody tr{border-bottom:1px solid rgba(42,49,64,.5);transition:background .1s}
tbody tr:hover{background:rgba(59,130,246,.03)}
tbody td{padding:8px 6px;text-align:center;font-size:11px;border-right:1px solid rgba(42,49,64,.3)}
tbody td:last-child{border-right:none}
tbody td:first-child{text-align:right;padding-right:14px}
.nrow{display:flex;align-items:center;gap:8px}
.mav{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;flex-shrink:0}

/* ── OVERVIEW ── */
.ovgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px}
.ovday{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px 8px;text-align:center;transition:all .15s}
.ovday:hover{border-color:var(--b2)}
.ovday.ald{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
.ovdn{font-size:9px;color:var(--muted)}.ovnum{font-size:18px;font-weight:800;margin:2px 0 6px}
.ovrow{font-size:10px;font-weight:600;margin-bottom:2px}

/* ── BALCARD ── */
.balcard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;margin-bottom:16px}
.baltitle{font-size:14px;font-weight:700;margin-bottom:12px}
.brow{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(42,49,64,.5);font-size:12px}
.brow:last-child{border-bottom:none}
.bl{color:var(--muted)}.bv{font-weight:700}
.bok{color:var(--green)}.bwarn{color:var(--morning)}.berr{color:var(--red)}

/* ── QUICK ACTIONS ── */
.qagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.qacard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;
  cursor:pointer;transition:all .15s;text-align:center}
.qacard:hover{border-color:var(--blue);transform:translateY(-2px)}
.qa-ico{font-size:26px;margin-bottom:8px}
.qa-title{font-size:12px;font-weight:700;color:var(--text)}
.qa-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* ── UPLOAD ── */
.upload-area{border:2px dashed var(--b1);border-radius:14px;padding:36px;text-align:center;
  cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-area:hover{border-color:var(--blue);background:var(--blue-bg)}
.upload-area input{display:none}
.prog-wrap{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width .3s}

/* ── PRINT BTN ── */
.print-btn{padding:9px 16px;border:none;border-radius:9px;background:var(--off-bg);
  color:var(--green);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px}
.edit-bal{margin-right:4px;padding:2px 7px;background:var(--blue-bg);border:none;border-radius:5px;
  color:var(--blue);cursor:pointer;font-size:10px}

/* ── JHN LOGO ── */
#jhn-logo{position:fixed;top:8px;left:12px;z-index:9999;display:flex;align-items:center;gap:6px}
#jhn-logo svg{flex-shrink:0}
.jhn-text{font-family:'Tajawal',sans-serif;line-height:1.3}
:root:not([data-theme=light]) #jhn-logo .jhn-text,.jhn-t1,svg #js{color:white;fill:white;stroke:white}
[data-theme=light] #jhn-logo .jhn-text{color:#1a6bb5}
[data-theme=light] #jhn-logo svg path,[data-theme=light] #jhn-logo svg circle{stroke:#1a6bb5;fill:none}
:root:not([data-theme=light]) #jhn-logo svg path,:root:not([data-theme=light]) #jhn-logo svg circle{stroke:white;fill:none}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;
  background:var(--s2);border:1px solid var(--b1);box-shadow:0 10px 30px rgba(0,0,0,.4);
  z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.ts{border-color:rgba(16,185,129,.5);color:var(--green)}
.ti{border-color:rgba(59,130,246,.5);color:var(--blue)}
.td{border-color:rgba(239,68,68,.5);color:var(--red)}
.tw{border-color:rgba(245,158,11,.5);color:var(--morning)}
.loader{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);
  border-top-color:white;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .sidebar{transform:translateX(100%);width:260px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0}
  .wrap{padding:14px}
  .sgrid{grid-template-columns:1fr 1fr}
  .mbox{width:95vw;padding:20px 16px}
  .sgm{grid-template-columns:1fr 1fr}
  .mb-toggle{display:flex!important}
}
.mb-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:101;
  width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));
  border:none;color:white;font-size:22px;cursor:pointer;box-shadow:0 4px 15px rgba(59,130,246,.4);
  align-items:center;justify-content:center}
@media print{
  .sidebar,.topbar,.btn-sub,.btn-ok,.btn-no,.tb-btn,.edit-bal,.nacts,.phdr button,.mctrl button,.mb-toggle,.jhn-logo{display:none!important}
  .main{margin-right:0!important}
  .pg{display:block!important}
  .calwrap,.ncard,.balcard,.scard{border:1px solid #ccc!important;background:white!important}
}

function doLogin(){
  var em=document.getElementById('li-em').value.trim().toLowerCase();
  var pw=document.getElementById('li-pw').value;

  var btn=document.getElementById('li-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="loader"><\/span>';
  sb.auth.signInWithPassword({email:em,password:pw}).then(function(r){
    btn.disabled=false;
    btn.textContent=LANG==='ar'?'\u062f\u062e\u0648\u0644':'Sign In';
    if(r.error){toast(LANG==='ar'?'\u0628\u064a\u0627\u0646\u0627\u062a \u062e\u0627\u0637\u0626\u0629':'Invalid credentials','td');return;}
    if(r.data&&r.data.user)loadMe(r.data.user.id);
  });
}

function doLogout(){sb.auth.signOut();}

function forgotPass(){
  var em=document.getElementById('li-em').value.trim().toLowerCase();

  sb.auth.resetPasswordForEmail(em,{redirectTo:window.location.origin}).then(function(){
    toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u0625\u0631\u0633\u0627\u0644 \u2713':'Sent \u2713','ts');
  });
}

function loadMe(uid){
  sb.from('user_profiles').select('*').eq('id',uid).maybeSingle().then(function(r){
    if(!r.data){toast('\u0627\u0644\u0628\u0631\u0648\u0641\u0627\u064a\u0644 \u063a\u064a\u0631 \u0645\u0648\u062c\u0648\u062f','td');return;}
    ME=Object.assign({id:uid},r.data);
    loadAll().then(function(){showApp();});
  });
}

function loadAll(){
  return Promise.all([
    sb.from('user_profiles').select('*'),
    sb.from('schedules').select('*'),
    sb.from('departments').select('*'),
    sb.from('schedule_status').select('*'),
    sb.from('leave_balance').select('*'),
    sb.from('manager_departments').select('*'),
    sb.from('swap_requests').select('*')
  ]).then(function(res){
    ALL_P={};(res[0].data||[]).forEach(function(x){ALL_P[x.id]=x;});
    ALL_S={};(res[1].data||[]).forEach(function(x){if(!ALL_S[x.nurse_id])ALL_S[x.nurse_id]={};ALL_S[x.nurse_id][x.date]={shift:x.shift,flag:x.flag};});
    ALL_D={};(res[2].data||[]).forEach(function(x){ALL_D[x.name]={m:x.cap_morning||99,e:x.cap_evening||99,n:x.cap_night||99,ld:x.cap_long_day||99};});
    ALL_ST={};(res[3].data||[]).forEach(function(x){ALL_ST[x.nurse_id]=x;});
    ALL_LB={};(res[4].data||[]).forEach(function(x){ALL_LB[x.nurse_id]=x;});
    ALL_MD={};(res[5].data||[]).forEach(function(x){if(!ALL_MD[x.manager_id])ALL_MD[x.manager_id]=[];ALL_MD[x.manager_id].push(x.dept_name);});
    ALL_SW=res[6].data||[];
    if(!RT){
      RT=sb.channel('rt')
        .on('postgres_changes',{event:'*',schema:'public',table:'schedules'},function(h){
          var nid=(h.new&&h.new.nurse_id)||(h.old&&h.old.nurse_id);if(!nid)return;
          if(h.eventType==='DELETE'){if(ALL_S[nid])delete ALL_S[nid][h.old.date];}
          else{if(!ALL_S[nid])ALL_S[nid]={};ALL_S[nid][h.new.date]={shift:h.new.shift,flag:h.new.flag};}
          render();
        })
        .on('postgres_changes',{event:'*',schema:'public',table:'schedule_status'},function(){
          sb.from('schedule_status').select('*').then(function(r2){ALL_ST={};(r2.data||[]).forEach(function(x){ALL_ST[x.nurse_id]=x;});render();});
        })
        .subscribe();
    }
  });
}

function getStats(uid,y,m){
  var data=ALL_S[uid]||{},counts={},work=0,rest=0,filled=0,floater=0,disaster=0;
  Object.keys(SCLS).forEach(function(k){counts[k]=0;});
  Object.keys(data).forEach(function(ds){
    var d=new Date(ds+'T00:00:00');
    if(d.getFullYear()!==y||d.getMonth()!==m)return;
    var e=data[ds];if(!e||!e.shift)return;
    counts[e.shift]=(counts[e.shift]||0)+1;filled++;
    if(SCAT[e.shift]==='work')work++;
    if(e.shift==='off')rest++;
    if(e.flag==='floater')floater++;
    if(e.flag==='disaster')disaster++;
  });
  return{counts:counts,work:work,rest:rest,filled:filled,days:new Date(y,m+1,0).getDate(),floater:floater,disaster:disaster};
}

function getReqRest(uid,y,m){
  var data=ALL_S[uid]||{},req=0;
  Object.keys(data).forEach(function(ds){
    var d=new Date(ds+'T00:00:00');
    if(d.getFullYear()!==y||d.getMonth()!==m)return;
    var sh=data[ds]&&data[ds].shift;
    if(sh&&REST[sh])req=Math.max(req,REST[sh]);
  });
  return req;
}

function shiftCount(dept,date,shift){
  return Object.values(ALL_P).filter(function(p){
    return p.role==='nurse'&&p.dept===dept&&(ALL_S[p.id]||{})[date]&&(ALL_S[p.id]||{})[date].shift===shift;
  }).length;
}

function shiftCap(dept,shift){
  var d=ALL_D[dept];if(!d)return 99;
  var m2={morning:'m',evening:'e',night:'n',long_day:'ld',long_night:'ld'};
  return d[m2[shift]]||99;
}

function getAlerts(dept,y,m){
  var days=new Date(y,m+1,0).getDate(),out=[];
  for(var d=1;d<=days&&out.length<8;d++){
    var ds=y+'-'+p2(m+1)+'-'+p2(d);
    ['morning','evening','night'].forEach(function(sh){
      var cap=shiftCap(dept,sh),cur=shiftCount(dept,ds,sh);
      if(cap<99&&cur<cap){
        var dt=new Date(ds+'T00:00:00');
        var dn=dt.toLocaleDateString('ar-SA',{month:'short',day:'numeric'});
        out.push({w:cur>0,msg:dn+' \u2014 '+SL(sh)+': '+cur+'/'+cap});
      }
    });
  }
  return out;
}

function checkDeadline(){
  if(!ME||ME.role!=='nurse')return;
  var st=(ALL_ST[ME.id]&&ALL_ST[ME.id].status)||'draft';
  if(st!=='draft'&&st!=='rejected')return;
  var now=new Date();
  var deadline=new Date(now.getFullYear(),now.getMonth(),20);
  var daysLeft=Math.ceil((deadline-now)/(1000*60*60*24));
  if(daysLeft<=0||daysLeft>10)return;
  if(document.getElementById('dl-banner'))return;
  var T=LANG==='ar';
  var b=document.createElement('div');
  b.id='dl-banner';b.className='deadline-banner';

function buildCal(gridId,uid,editable,y,m){
  var grid=document.getElementById(gridId);if(!grid)return;
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  var today=new Date(),data=ALL_S[uid]||{},h='';
  for(var i=0;i<first;i++)h+='<div class="cday cempty"><\/div>';
  for(var d=1;d<=days;d++){
    var ds=y+'-'+p2(m+1)+'-'+p2(d);
    var iT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    var e=data[ds];
    var pill='';
    if(e){
      pill='<span class="sp '+(SCLS[e.shift]||'po')+'">'+SL(e.shift)+'<\/span>';
      if(e.flag==='floater')pill+='<span class="sp poc" style="font-size:8px">\uD83D\uDD35<\/span>';
      if(e.flag==='disaster')pill+='<span class="sp pds" style="font-size:8px">\uD83D\uDEA8<\/span>';
    }
    var cl=editable?'onclick="openModal(\''+ds+'\')"':'';
    h+='<div class="cday'+(iT?' today':'')+(editable?'':' cempty')+'" '+cl+'><div class="dn">'+d+'<\/div>'+pill+'<\/div>';
  }
  grid.innerHTML=h;
}

function openModal(ds){
  selDay=ds;selShift=null;
  var e=(ALL_S[ME.id]||{})[ds];if(e)selShift=e.shift;
  var dt=new Date(ds+'T00:00:00');
  document.getElementById('m-dt').textContent=dt.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  buildShiftOpts(ds);
  document.getElementById('smodal').style.display='flex';
}

function buildShiftOpts(ds){
  var dept=ME.dept||'';
  var myEntry=(ALL_S[ME.id]||{})[ds];
  var myShiftType=myEntry?myEntry.shift:null;
  var order=['official','morning','evening','night','long_day','long_night','off','oncall','disaster','annual_leave','hajj','fitr','sick','exceptional','compensation'];
  var h='';
  order.forEach(function(k){
    var cap=shiftCap(dept,k),cur=shiftCount(dept,ds,k);
    var myShift=myShiftType===k;
    var isFull=SCAT[k]==='work'&&cap<99&&cur>=cap&&!myShift;
    if(k==='oncall'&&myShiftType&&SCAT[myShiftType]!=='off')isFull=true;
    if(k==='disaster'&&myShiftType&&SCAT[myShiftType]!=='work')isFull=true;
    var badge=SCAT[k]==='work'&&cap<99?'<span class="cap-b '+(isFull?'cap-f':'cap-o')+'">'+cur+'/'+cap+'<\/span>':'';
    h+='<div class="sopt'+(isFull?' dis':'')+(k===selShift?' picked':'')+'" style="color:'+SCOLOR[k]+'" onclick="pickShift(\''+k+'\')">';
    h+=badge+'<div class="ico">'+SICO[k]+'<\/div><div class="lbl">'+SL(k)+'<\/div><div class="tim">'+STIME[k]+'<\/div><\/div>';
  });
  document.getElementById('shift-opts').innerHTML=h;
}

function closeModal(){document.getElementById('smodal').style.display='none';}

function pickShift(k){
  selShift=k;
  buildShiftOpts(selDay);
  document.querySelectorAll('.sopt').forEach(function(o){o.classList.remove('picked');});
  var order=['official','morning','evening','night','long_day','long_night','off','oncall','disaster','annual_leave','hajj','fitr','sick','exceptional','compensation'];
  var idx=order.indexOf(k);
  var opts=document.querySelectorAll('.sopt');if(opts[idx])opts[idx].classList.add('picked');
}

function saveShift(){
  if(!selShift){toast(LANG==='ar'?'\u0627\u062e\u062a\u0631 \u0627\u0644\u0634\u0641\u062a':'Select shift','tw');return;}
  var dept=ME.dept||'',cap=shiftCap(dept,selShift),cur=shiftCount(dept,selDay,selShift);
  var myEntry=(ALL_S[ME.id]||{})[selDay];
  var myShift=myEntry&&myEntry.shift===selShift;
  if(SCAT[selShift]==='work'&&cap<99&&cur>=cap&&!myShift){toast((LANG==='ar'?'\u0627\u0644\u0634\u0641\u062a \u0645\u0643\u062a\u0645\u0644 ':'Shift full ')+cur+'/'+cap,'td');return;}
  var flag=null,shiftToSave=selShift;
  if(selShift==='oncall'){flag='floater';shiftToSave=(myEntry&&myEntry.shift)||'off';}
  if(selShift==='disaster'){flag='disaster';}
  sb.from('schedules').upsert({nurse_id:ME.id,date:selDay,shift:shiftToSave,flag:flag},{onConflict:'nurse_id,date'}).then(function(r){
    if(r.error)return toast(r.error.message,'td');
    if(!ALL_S[ME.id])ALL_S[ME.id]={};
    ALL_S[ME.id][selDay]={shift:shiftToSave,flag:flag};
    var curSt=ALL_ST[ME.id]&&ALL_ST[ME.id].status;
    if(curSt&&curSt!=='draft'){
      sb.from('schedule_status').update({status:'draft'}).eq('nurse_id',ME.id).then(function(){
        sb.from('schedule_status').select('*').then(function(st2){ALL_ST={};(st2.data||[]).forEach(function(x){ALL_ST[x.nurse_id]=x;});});
      });
    }
    closeModal();render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062d\u0641\u0638 \u2713':'Saved \u2713','ts');
  });
}

  sb.from('swap_requests').update({status:status}).eq('id',id).then(function(r){
    if(r.error)return toast(r.error.message,'td');
    if(status==='approved'&&swap){
      var myShift=(ALL_S[ME.id]||{})[swap.swap_date];
      var theirShift=(ALL_S[swap.requester_id]||{})[swap.swap_date];
      var ops=[];
      if(myShift)ops.push(sb.from('schedules').upsert({nurse_id:swap.requester_id,date:swap.swap_date,shift:myShift.shift,flag:myShift.flag||null},{onConflict:'nurse_id,date'}));
      if(theirShift)ops.push(sb.from('schedules').upsert({nurse_id:ME.id,date:swap.swap_date,shift:theirShift.shift,flag:theirShift.flag||null},{onConflict:'nurse_id,date'}));
      Promise.all(ops).then(function(){loadAll().then(render);});
    }
    toast(status==='approved'?(T?'\u062a\u0645 \u0627\u0644\u062a\u0628\u062f\u064a\u0644 \u2713':'Swapped \u2713'):(T?'\u062a\u0645 \u0627\u0644\u0631\u0641\u0636':'Rejected'),'ts');
    loadAll().then(render);
  });
}

function exportToCalendar(){
  var T=LANG==='ar';
  var data=ALL_S[ME.id]||{};
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//NurseFlow//EN','CALSCALE:GREGORIAN'];
  Object.keys(data).forEach(function(ds){
    var e=data[ds];if(!e||!e.shift||e.shift==='off')return;
    var times={official:'073000',morning:'070000',evening:'150000',night:'230000',long_day:'070000',long_night:'190000'};
    var endTimes={official:'163000',morning:'163000',evening:'003000',night:'073000',long_day:'190000',long_night:'070000'};
    var st2=times[e.shift]||'070000',et=endTimes[e.shift]||'150000';
    var dateStr=ds.replace(/-/g,'');
    var endDate=(e.shift==='night'||e.shift==='long_night')?new Date(new Date(ds+'T00:00:00').getTime()+86400000).toISOString().slice(0,10).replace(/-/g,''):dateStr;
    lines.push('BEGIN:VEVENT','DTSTART:'+dateStr+'T'+st2+'00','DTEND:'+endDate+'T'+et+'00','SUMMARY:'+(T?'\u0634\u0641\u062a: ':'Shift: ')+SL(e.shift),'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='nurseflow-schedule.ics';a.click();
  URL.revokeObjectURL(url);
  toast(T?'\u062a\u0645 \u0627\u0644\u062a\u0635\u062f\u064a\u0631 \u2713':'Exported \u2713','ts');
}

function copySchedule(){
  var T=LANG==='ar';
  if(!confirm(T?'\u0646\u0633\u062e \u062c\u062f\u0648\u0644 \u0627\u0644\u0634\u0647\u0631 \u0627\u0644\u062d\u0627\u0644\u064a \u0644\u0644\u0634\u0647\u0631 \u0627\u0644\u0642\u0627\u062f\u0645\u061f':'Copy current month to next month?'))return;
  var now=new Date(),y=now.getFullYear(),m=now.getMonth();
  var nextY=m===11?y+1:y,nextM=m===11?0:m+1;
  var data=ALL_S[ME.id]||{},toInsert=[];
  Object.keys(data).forEach(function(ds){
    var d=new Date(ds+'T00:00:00');
    if(d.getFullYear()===y&&d.getMonth()===m){
      var e=data[ds];
      toInsert.push({nurse_id:ME.id,date:nextY+'-'+p2(nextM+1)+'-'+p2(d.getDate()),shift:e.shift,flag:e.flag||null});
    }
  });
  if(!toInsert.length){toast(T?'\u0644\u0627 \u064a\u0648\u062c\u062f \u062c\u062f\u0648\u0644 \u0644\u0644\u0646\u0633\u062e':'No schedule to copy','tw');return;}
  sb.from('schedules').upsert(toInsert,{onConflict:'nurse_id,date'}).then(function(r){
    if(r.error)return toast(r.error.message,'td');
    toInsert.forEach(function(x){if(!ALL_S[ME.id])ALL_S[ME.id]={};ALL_S[ME.id][x.date]={shift:x.shift,flag:x.flag};});
    toast((T?'\u062a\u0645 \u0627\u0644\u0646\u0633\u062e: ':'Copied: ')+toInsert.length+(T?' \u064a\u0648\u0645':' days'),'ts');
    render();
  });
}

    +'<div class="balcard"><div class="baltitle">\uD83D\uDCC1 '+(T?'\u0631\u0641\u0639 \u0627\u0644\u0645\u0644\u0641':'Upload File')+'<\/div>'

    +'<div class="calwrap twrap"><table><thead><tr><th>'+(T?'\u0627\u0644\u0627\u0633\u0645':'Name')+'<\/th><th>'+(T?'\u0627\u0644\u0642\u0633\u0645':'Dept')+'<\/th><th>'+(T?'\u0627\u0644\u062f\u0648\u0631':'Role')+'<\/th><th><\/th><\/tr><\/thead><tbody>'
    +Object.values(ALL_P).map(function(u){

function downloadTemplate(){
  var T=LANG==='ar';
  var ws=XLSX.utils.aoa_to_sheet([[T?'\u0627\u0644\u0627\u0633\u0645':'Name',T?'\u0627\u0644\u0625\u064a\u0645\u064a\u0644':'Email',T?'\u0643\u0644\u0645\u0629 \u0627\u0644\u0633\u0631':'Password',T?'\u0627\u0644\u062f\u0648\u0631':'Role',T?'\u0627\u0644\u0642\u0633\u0645':'Department'],['Example Name','nurse@hospital.com','1234','nurse',T?'\u0637\u0648\u0627\u0631\u0626':'Emergency']]);
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Staff');
  XLSX.writeFile(wb,'nurseflow_template.xlsx');
}

function handleUpload(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var data=new Uint8Array(e.target.result);
    var wb=XLSX.read(data,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1});
    if(rows.length<2){toast(LANG==='ar'?'\u0627\u0644\u0645\u0644\u0641 \u0641\u0627\u0631\u063a':'Empty file','tw');return;}
    processRows(rows.slice(1));
  };
  reader.readAsArrayBuffer(file);
}

function processRows(rows){
  var T=LANG==='ar';
  var valid=rows.filter(function(r){return r[0]&&r[1]&&r[2];});
  if(!valid.length){toast(T?'\u0644\u0627 \u062a\u0648\u062c\u062f \u0628\u064a\u0627\u0646\u0627\u062a':'No valid data','tw');return;}
  document.getElementById('upload-progress').style.display='block';
  var results=[],done=0;
  function updateProgress(){var pct=Math.round(done/valid.length*100);document.getElementById('prog-bar').style.width=pct+'%';document.getElementById('prog-text').textContent=(T?'\u062c\u0627\u0631\u064d \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629: ':'Processing: ')+done+'/'+valid.length;}
  function processNext(idx){
    if(idx>=valid.length){showResults(results);return;}
    var row=valid[idx];
    var name=String(row[0]||'').trim(),email=String(row[1]||'').trim().toLowerCase(),pass=String(row[2]||'1234').trim(),role=String(row[3]||'nurse').trim(),dept=String(row[4]||'').trim();
    if(!['nurse','head_nurse','manager','admin'].includes(role))role='nurse';
    sb.rpc('create_user_with_profile',{p_email:email,p_password:pass,p_name:name,p_role:role,p_dept:dept}).then(function(r){
      done++;updateProgress();
      if(r.error)results.push({name:name,email:email,ok:false,msg:r.error.message});
      else{results.push({name:name,email:email,ok:true});if(r.data)ALL_P[r.data]={id:r.data,name:name,email:email,role:role,dept:dept};}
      setTimeout(function(){processNext(idx+1);},200);
    });
  }
  processNext(0);
}

function showResults(results){
  var T=LANG==='ar';
  var ok=results.filter(function(r){return r.ok;}).length;
  var fail=results.filter(function(r){return !r.ok;});
  var h='<div class="balcard" style="margin-top:16px"><div class="baltitle">\u2705 '+(T?'\u0627\u0644\u0646\u062a\u0627\u0626\u062c':'Results')+': '+ok+'/'+(ok+fail.length)+'<\/div>';
  if(fail.length){h+='<div style="margin-top:8px">';fail.forEach(function(f){h+='<div style="font-size:11px;color:var(--muted);padding:4px 0">'+f.email+': '+f.msg+'<\/div>';});h+='<\/div>';}
  h+='<\/div>';
  document.getElementById('upload-results').innerHTML=h;
  document.getElementById('upload-progress').style.display='none';
  toast((T?'\u062a\u0645\u062a \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629: ':'Done: ')+ok+' '+(T?'\u062a\u0645\u062a \u0625\u0636\u0627\u0641\u062a\u0647\u0645':'added'),'ts');
}

function saveUserEdit(uid){
  var deptEl=document.getElementById('ef-'+uid+'-dept');
  var roleEl=document.getElementById('rs-'+uid);
  if(!deptEl||!roleEl)return;
  sb.from('user_profiles').update({dept:deptEl.value.trim(),role:roleEl.value}).eq('id',uid).then(function(r){
    if(r.error)return toast(r.error.message,'td');
    if(ALL_P[uid]){ALL_P[uid].dept=deptEl.value.trim();ALL_P[uid].role=roleEl.value;}
    toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062a\u0639\u062f\u064a\u0644 \u2713':'Updated \u2713','ts');
  });
}

    });
    mgrHtml+='<\/div><\/div>';
  });
  pg.innerHTML='<div class="phdr"><div class="ptitle">\uD83D\uDD11 '+(T?'\u0644\u0648\u062d\u0629 \u0627\u0644\u0625\u062f\u0627\u0631\u0629':'Admin Panel')+'<\/div><\/div>'
    +'<div class="balcard" style="margin-bottom:16px"><div class="baltitle">\u2795 '+(T?'\u0625\u0636\u0627\u0641\u0629 \u0642\u0633\u0645':'Add Dept')+'<\/div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'
    +'<div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">'+(T?'\u0627\u0644\u0627\u0633\u0645':'Name')+'<\/label><input id="d-n" placeholder="'+(T?'\u0637\u0648\u0627\u0631\u0626':'ER')+'" style="padding:8px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-size:13px;outline:none;width:130px"><\/div>'
    +'<div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">\u2600\uFE0F<\/label><input id="d-m" type="number" placeholder="0" min="0" style="padding:8px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-size:13px;outline:none;width:55px"><\/div>'
    +'<div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">\uD83C\uDF06<\/label><input id="d-e" type="number" placeholder="0" min="0" style="padding:8px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-size:13px;outline:none;width:55px"><\/div>'
    +'<div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">\uD83C\uDF19<\/label><input id="d-nn" type="number" placeholder="0" min="0" style="padding:8px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-size:13px;outline:none;width:55px"><\/div>'
    +'<div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">12h<\/label><input id="d-l" type="number" placeholder="0" min="0" style="padding:8px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-size:13px;outline:none;width:55px"><\/div>'
    +'<button onclick="addDept()" class="btn-sub">'+(T?'\u062d\u0641\u0638':'Save')+'<\/button><\/div><\/div>'
    +'<div class="calwrap twrap" style="margin-bottom:16px"><table><thead><tr><th>'+(T?'\u0627\u0644\u0642\u0633\u0645':'Dept')+'<\/th><th>\u2600\uFE0F<\/th><th>\uD83C\uDF06<\/th><th>\uD83C\uDF19<\/th><th>12h<\/th><th><\/th><\/tr><\/thead><tbody>'+deptsRows+'<\/tbody><\/table><\/div>'
    +(managers.length?'<div class="balcard"><div class="baltitle">\uD83D\uDC54 '+(T?'\u0623\u0642\u0633\u0627\u0645 \u0627\u0644\u0645\u0646\u062c\u0631\u0632':'Manager Depts')+'<\/div>'+mgrHtml+'<\/div>':'');

function addDept(){
  var name=document.getElementById('d-n').value.trim();
  var m2=parseInt(document.getElementById('d-m').value)||0;
  var e2=parseInt(document.getElementById('d-e').value)||0;
  var n2=parseInt(document.getElementById('d-nn').value)||0;
  var l2=parseInt(document.getElementById('d-l').value)||0;
  if(!name){toast(LANG==='ar'?'\u0623\u062f\u062e\u0644 \u0627\u0633\u0645 \u0627\u0644\u0642\u0633\u0645':'Enter dept name','tw');return;}
  sb.from('departments').insert({name:name,cap_morning:m2,cap_evening:e2,cap_night:n2,cap_long_day:l2,cap_long_night:l2}).then(function(r){
    if(r.error)return toast(r.error.message,'td');
    ALL_D[name]={m:m2,e:e2,n:n2,ld:l2};render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u0625\u0636\u0627\u0641\u0629 \u2713':'Added \u2713','ts');
  });
}

function delDept(name){
  if(!confirm((LANG==='ar'?'\u062d\u0630\u0641 \u0642\u0633\u0645 ':'Delete dept ')+name+'?'))return;
  sb.from('departments').delete().eq('name',name).then(function(){delete ALL_D[name];render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062d\u0630\u0641':'Deleted','ti');});
}

function toggleMgrDept(mgrId,dept){
  var myDepts=ALL_MD[mgrId]||[];
  var has=myDepts.indexOf(dept)>=0;
  if(has){
    sb.from('manager_departments').delete().eq('manager_id',mgrId).eq('dept_name',dept).then(function(r){
      if(r.error)return toast(r.error.message,'td');
      ALL_MD[mgrId]=myDepts.filter(function(d){return d!==dept;});render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u062d\u0630\u0641':'Removed','ti');
    });
  } else {
    sb.from('manager_departments').insert({manager_id:mgrId,dept_name:dept}).then(function(r){
      if(r.error)return toast(r.error.message,'td');
      if(!ALL_MD[mgrId])ALL_MD[mgrId]=[];ALL_MD[mgrId].push(dept);render();toast(LANG==='ar'?'\u062a\u0645 \u0627\u0644\u0625\u0636\u0627\u0641\u0629 \u2713':'Added \u2713','ts');
    });
  }
}

function updateBadges(){
  var nurses=Object.values(ALL_P).filter(function(p){return p.role==='nurse';});
  var rb=document.getElementById('b-pg-review');
  var ab=document.getElementById('b-pg-approve');
  if(rb){var n=nurses.filter(function(n2){return n2.dept===ME.dept&&ALL_ST[n2.id]&&ALL_ST[n2.id].status==='submitted';}).length;rb.textContent=n;rb.style.display=n?'inline-flex':'none';}
  if(ab){var n2=nurses.filter(function(n3){return ALL_ST[n3.id]&&ALL_ST[n3.id].status==='reviewed';}).length;ab.textContent=n2;ab.style.display=n2?'inline-flex':'none';}
}

function toggleTheme(){
  var isL=document.documentElement.getAttribute('data-theme')==='light';
  if(isL){document.documentElement.removeAttribute('data-theme');localStorage.setItem('nf-theme','dark');document.getElementById('theme-btn').textContent='\uD83C\uDF19';}
  else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem('nf-theme','light');document.getElementById('theme-btn').textContent='\u2600\uFE0F';}
}

function toggleLang(){
  LANG=LANG==='ar'?'en':'ar';
  localStorage.setItem('nf-lang',LANG);
  document.documentElement.dir=LANG==='ar'?'rtl':'ltr';
  document.getElementById('lang-btn').textContent=LANG==='ar'?'EN':'AR';

}
